{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>🎯 Admission Predictor</h1>

    <p>
        Predict your admission chances based on your academic profile.
    </p>

</div>

<div class="predictor-container">

    <div class="predictor-card">

        <form action="/predict-result" method="POST">

            <div class="form-group">

                <label>JEE Rank</label>

                <input
                    type="number"
                    name="rank"
                    placeholder="Enter your JEE Rank"
                    required
                >

            </div>

            <div class="form-group">

                <label>Preferred Branch</label>

                <select name="branch" required>

                    <option value="">Select Branch</option>
                    <option>CSE</option>
                    <option>IT</option>
                    <option>Mechanical</option>
                    <option>ECE</option>
                    <option>Civil</option>

                </select>

            </div>

            <div class="form-group">

                <label>Category</label>

                <select name="category" required>

                    <option value="">Select Category</option>
                    <option>General</option>
                    <option>OBC</option>
                    <option>EWS</option>
                    <option>SC</option>
                    <option>ST</option>

                </select>

            </div>

            <div class="form-group">

                <label>Preferred State</label>

                <select name="state">

                    <option>Rajasthan</option>
                    <option>Uttarakhand</option>
                    <option>Uttar Pradesh</option>
                    <option>Delhi</option>
                    <option>Punjab</option>
                    <option>Haryana</option>
                    <option>Madhya Pradesh</option>

                </select>

            </div>

            <div class="form-group">

                <label>Maximum Annual Budget (₹)</label>

                <input
                    type="number"
                    name="budget"
                    placeholder="e.g. 300000"
                    required
                >

            </div>

            <button class="btn predictor-btn">

                🚀 Predict Admission

            </button>

        </form>

    </div>

</div>

{% endblock %}
