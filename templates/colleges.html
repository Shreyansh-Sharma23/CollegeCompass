<!DOCTYPE html>
<html>

<head>
    <title>Find Colleges - CollegeCompass</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fc;
        }

        nav {
            background: #1e3a8a;
            color: white;
            padding: 20px 50px;
        }

        nav h2 {
            font-size: 30px;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <nav>
        <h2>🎓 CollegeCompass</h2>
    </nav>

    <div class="container">

        <h1>Find Colleges</h1>

        <form method="POST" action="/search">

            <label>Course</label>

            <select name="course">
                <option>BTech</option>
                <option>BCA</option>
                <option>BBA</option>
            </select>

            <label>Branch</label>

            <select name="branch">
                <option>CSE</option>
                <option>IT</option>
                <option>Mechanical</option>
            </select>

            <label>Budget (Per Year)</label>

            <input type="number" name="budget">

            <button type="submit">
                Search Colleges
            </button>

        </form>

    </div>

</body>

</html>
