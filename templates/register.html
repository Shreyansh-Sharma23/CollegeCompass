<!DOCTYPE html>
<html>

<head>

    <title>Create Account</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .container{
            width:450px;
            margin:70px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-top:18px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:6px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:30px;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        p{
            margin-top:20px;
            text-align:center;
        }

        a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form action="/save-user" method="POST">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">
Register
</button>

</form>

<p>

Already have an account?

<a href="/login">
Login
</a>

</p>

</div>

</body>

</html>
