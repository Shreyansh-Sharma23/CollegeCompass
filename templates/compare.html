{% extends "base.html" %}

{% block content %}

<div class="compare-container">

    <h1 class="page-title">📊 Compare Colleges</h1>

    <p class="compare-subtitle">
        Compare fees, placements, ROI and packages before making your decision.
    </p>

    <div class="compare-card">

        <form action="/compare-result" method="POST">

            <div class="compare-select">

                <label>🏫 First College</label>

                <select name="college1" required>

                    {% for college in colleges %}
                    <option value="{{ college[0] }}">
                        {{ college[1] }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="vs-circle">

                VS

            </div>

            <div class="compare-select">

                <label>🏫 Second College</label>

                <select name="college2" required>

                    {% for college in colleges %}
                    <option value="{{ college[0] }}">
                        {{ college[1] }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <button class="btn compare-btn">

                Compare Colleges →

            </button>

        </form>

    </div>

</div>

{% endblock %}
