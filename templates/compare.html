<!DOCTYPE html>

<html>

<head>
    <title>Compare Colleges - CollegeCompass</title>

```
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f7fc;
    }

    nav{
        background:#1e3a8a;
        color:white;
        padding:20px 50px;
    }

    nav h2{
        font-size:30px;
    }

    .nav-container{
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .nav-links a{
        color:white;
        text-decoration:none;
        margin-left:20px;
        font-size:18px;
        transition:0.3s;
    }

    .nav-links a:hover{
        color:#bfdbfe;
    }

    .hero{
        text-align:center;
        padding:60px 20px;
    }

    .hero h1{
        color:#1e3a8a;
        font-size:48px;
        margin-bottom:15px;
    }

    .hero p{
        color:#555;
        font-size:20px;
    }

    .compare-card{
        width:70%;
        max-width:800px;
        margin:auto;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0px 4px 15px rgba(0,0,0,0.1);
    }

    .form-group{
        margin-bottom:25px;
    }

    label{
        display:block;
        margin-bottom:10px;
        font-weight:bold;
        color:#1e3a8a;
        font-size:18px;
    }

    select{
        width:100%;
        padding:15px;
        border:1px solid #ddd;
        border-radius:10px;
        font-size:16px;
    }

    .compare-btn{
        width:100%;
        padding:15px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
    }

    .compare-btn:hover{
        background:#1d4ed8;
    }

    .vs{
        text-align:center;
        font-size:28px;
        font-weight:bold;
        color:#2563eb;
        margin:20px 0;
    }

</style>
```

</head>

<body>

<nav>
    <div class="nav-container">

```
    <h2>🎓 CollegeCompass</h2>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/colleges">Find Colleges</a>
        <a href="/compare">Compare Colleges</a>
    </div>

</div>
```

</nav>

<div class="hero">

```
<h1>Compare Colleges</h1>

<p>
    Compare placements, fees, ROI, packages and more.
</p>
```

</div>

<div class="compare-card">

```
<form action="/compare-result" method="POST">

    <div class="form-group">

        <label>🏫 Select First College</label>

        <select name="college1" required>

            {% for college in colleges %}
            <option value="{{ college[0] }}">
                {{ college[1] }}
            </option>
            {% endfor %}

        </select>

    </div>

    <div class="vs">
        VS
    </div>

    <div class="form-group">

        <label>🏫 Select Second College</label>

        <select name="college2" required>

            {% for college in colleges %}
            <option value="{{ college[0] }}">
                {{ college[1] }}
            </option>
            {% endfor %}

        </select>

    </div>

    <button type="submit" class="compare-btn">
        Compare Colleges 🚀
    </button>

</form>
```

</div>

</body>

</html>
