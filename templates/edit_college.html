<!DOCTYPE html>
<html>

<head>

    <title>Edit College</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .container{
            width:600px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Edit College</h1>

<form action="/update-college/{{ college[0] }}" method="POST">

<label>College Name</label>
<input type="text" name="name" value="{{ college[1] }}" required>

<label>City</label>
<input type="text" name="city" value="{{ college[2] }}" required>

<label>Course</label>
<input type="text" name="course" value="{{ college[3] }}" required>

<label>Branch</label>
<input type="text" name="branch" value="{{ college[4] }}" required>

<label>Fees</label>
<input type="number" name="fees" value="{{ college[5] }}" required>

<label>Average Package</label>
<input type="number" step="0.1" name="avg_package" value="{{ college[6] }}" required>

<label>Highest Package</label>
<input type="text" name="highest_package" value="{{ college[7] }}" required>

<label>Placement</label>
<input type="text" name="placement" value="{{ college[8] }}" required>

<label>ROI</label>
<input type="number" step="0.01" name="roi" value="{{ college[9] }}" required>

<button type="submit">
Update College
</button>

</form>

</div>

</body>

</html>
